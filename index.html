  {"pt":"Quem se inebria do Espírito está enraizado em Cristo.","en":"Whoever is inebriated with the Spirit is rooted in Christ.","es":"Quien se embriaga del Espíritu está arraigado en Cristo.","it":"Chi si inebbria dello Spirito è radicato in Cristo.","src":"São Ambrósio"},
  {"pt":"Esteja em cada um a alma de Maria que engrandece o Senhor.","en":"Let there be in each one the soul of Mary who magnifies the Lord.","es":"Esté en cada uno el alma de María que engrandece al Señor.","it":"Sia in ciascuno l'anima di Maria che magnifica il Signore.","src":"São Ambrósio"},
  {"pt":"Cada idade é madura para Cristo.","en":"Every age is ripe for Christ.","es":"Cada edad es madura para Cristo.","it":"Ogni età è matura per Cristo.","src":"São Ambrósio"},
  {"pt":"A primeira qualidade de quem governa é a justiça.","en":"The first quality of one who governs is justice.","es":"La primera cualidad de quien gobierna es la justicia.","it":"La prima qualità di chi governa è la giustizia.","src":"São Ambrósio"},
  {"pt":"Levanto o cálice da salvação, chamando cálice ao sofrimento no combate espiritual.","en":"I lift the cup of salvation, calling the suffering in spiritual combat a cup.","es":"Levanto el cáliz de la salvación, llamando cáliz al sufrimiento en el combate espiritual.","it":"Innalzo il calice della salvezza, chiamando calice al soffrimento nel combattimento spirituale.","src":"São Basílio"},
  {"pt":"Nos perigos, nas angústias e nas incertezas, pensa em Maria, invoca Maria.","en":"In dangers, in anguish and in uncertainties, think of Mary, call upon Mary.","es":"En los peligros, en las angustias y en las incertidumbres, piensa en María, invoca a María.","it":"Nei pericoli, nelle angosce e nelle incertezze, pensa a Maria, invoca Maria.","src":"São Bernardo"},
  {"pt":"Deus é encontrado mais facilmente com a oração do que com o debate.","en":"God is found more easily by prayer than by debate.","es":"Dios se encuentra más fácilmente con la oración que con el debate.","it":"Dio si trova più facilmente con la preghiera che con la discussione.","src":"São Bernardo"},
  {"pt":"As ocupações excessivas endurecem o coração e fazem sofrer o espírito.","en":"Excessive occupations harden the heart and make the spirit suffer.","es":"Las ocupaciones excesivas endurecen el corazón y hacen sufrir al espíritu.","it":"Le occupazioni eccessive induriscono il cuore e fanno soffrire lo spirito.","src":"São Bernardo"},
  {"pt":"Na vida eterna veremos, amaremos e todos os nossos desejos serão realizados.","en":"In eternal life we shall see, we shall love, and all our desires will be fulfilled.","es":"En la vida eterna veremos, amaremos y todos nuestros deseos serán realizados.","it":"Nella vita eterna vedremo, ameremo e tutti i nostri desideri saranno realizzati.","src":"São Boaventura"},
  {"pt":"A vida de Francisco se assemelha ao início e ao crescimento da Igreja.","en":"The life of Francis resembles the beginning and the growth of the Church.","es":"La vida de Francisco se asemeja al inicio y al crecimiento de la Iglesia.","it":"La vita di Francesco somiglia all'inizio e alla crescita della Chiesa.","src":"São Boaventura"},
  {"pt":"Ó alma, o teu modelo é Deus: beleza infinita, luz sem sombras.","en":"O soul, your model is God: infinite beauty, light without shadows.","es":"Oh alma, tu modelo es Dios: belleza infinita, luz sin sombras.","it":"O anima, il tuo modello è Dio: bellezza infinita, luce senza ombre.","src":"São Roberto Belarmino"},
  {"pt":"A Igreja é a mãe virgem de todos os cristãos.","en":"The Church is the virgin mother of all Christians.","es":"La Iglesia es la madre virgen de todos los cristianos.","it":"La Chiesa è la madre vergine di tutti i cristiani.","src":"Santa Hildegarda de Bingen"},
  {"pt":"A esperança é um dom do qual o cristão nunca deveria se privar.","en":"Hope is a gift of which the Christian should never deprive himself.","es":"La esperanza es un don del cual el cristiano nunca debería privarse.","it":"La speranza è un dono di cui il cristiano non dovrebbe mai privarsi.","src":"São Paulo VI"},
  {"pt":"Não é possível viver sem esperança!","en":"It is not possible to live without hope!","es":"¡No es posible vivir sin esperanza!","it":"Non è possibile vivere senza speranza!","src":"São Paulo VI"},
  {"pt":"Procurai descobrir os aspectos positivos, sem vos entregardes a críticas insensatas.","en":"Seek to discover the positive aspects, without giving yourselves over to senseless criticism.","es":"Procurad descubrir los aspectos positivos, sin entregaros a críticas insensatas.","it":"Cercate di scoprire gli aspetti positivi, senza abbandonarvi a critiche insensate.","src":"São Paulo VI"},
  {"pt":"O mundo precisa ver homens e mulheres que acreditaram na Palavra do Senhor.","en":"The world needs to see men and women who believed in the Word of the Lord.","es":"El mundo necesita ver hombres y mujeres que creyeron en la Palabra del Señor.","it":"Il mondo ha bisogno di vedere uomini e donne che credettero alla Parola del Signore.","src":"São Paulo VI"},
  {"pt":"O culto de Maria é fonte de ensinamentos evangélicos.","en":"Devotion to Mary is a source of evangelical teachings.","es":"El culto de María es fuente de enseñanzas evangélicas.","it":"Il culto di Maria è fonte di insegnamenti evangelici.","src":"São Paulo VI"},
  {"pt":"Cada cristão deve ser uma centelha de luz, um foco de amor e um fermento.","en":"Every Christian must be a spark of light, a focus of love and a leaven.","es":"Cada cristiano debe ser una centella de luz, un foco de amor y un fermento.","it":"Ogni cristiano deve essere una scintilla di luce, un focolare d'amore e un fermento.","src":"São João XXIII"},
  {"pt":"É um imperativo do dever, é uma exigência do amor.","en":"It is an imperative of duty, it is a demand of love.","es":"Es un imperativo del deber, es una exigencia del amor.","it":"È un imperativo del dovere, è un'esigenza dell'amore.","src":"São João XXIII"},
  {"pt":"No meio de tanta treva, há sinais que dão sólida esperança de tempos melhores.","en":"Amid so much darkness, there are signs that give solid hope of better times.","es":"En medio de tanta tiniebla, hay señales que dan sólida esperanza de tiempos mejores.","it":"In mezzo a tanta tenebra, vi sono segni che danno solida speranza di tempi migliori.","src":"São João XXIII"},
  {"pt":"Aqui me tornei filha de Deus!","en":"Here I became a daughter of God!","es":"¡Aquí me torné hija de Dios!","it":"Qui sono diventata figlia di Dio!","src":"Santa Josefina Bakhita"},
  {"pt":"Quem é o Senhor de todas estas coisas tão bonitas?","en":"Who is the Lord of all these beautiful things?","es":"¿Quién es el Señor de todas estas cosas tan bonitas?","it":"Chi è il Signore di tutte queste cose così belle?","src":"Santa Josefina Bakhita"},
  {"pt":"Se Judas tivesse pedido perdão a Jesus, também ele teria encontrado misericórdia.","en":"If Judas had asked Jesus for forgiveness, he too would have found mercy.","es":"Si Judas hubiera pedido perdón a Jesús, también él habría encontrado misericordia.","it":"Se Giuda avesse chiesto perdono a Gesù, anche lui avrebbe trovato misericordia.","src":"Santa Josefina Bakhita"},
  {"pt":"Para cima!","en":"Upward!","es":"¡Hacia arriba!","it":"Verso l'alto!","src":"São Pier Giorgio Frassati"},
  {"pt":"Se tiveres Deus no centro de todas as tuas ações, chegarás até o fim.","en":"If you have God at the center of all your actions, you will reach the end.","es":"Si tuvieres a Dios en el centro de todas tus acciones, llegarás hasta el fin.","it":"Se avrai Dio al centro di tutte le tue azioni, arriverai fino alla fine.","src":"São Pier Giorgio Frassati"},
  {"pt":"O Senhor é o meu luminar; o meu Deus é a rocha onde me abrigo.","en":"The Lord is my lamp; my God is the rock in whom I take refuge.","es":"El Señor es mi lámpara; mi Dios es la roca en quien me amparo.","it":"Il Signore è mia lampada; il mio Dio è la roccia in cui mi rifugio.","src":"Salmo 18,29"},
  {"pt":"Esforça-te e tem bom ânimo; não temas, porque o Senhor, teu Deus, está contigo.","en":"Be strong and courageous; do not fear, for the Lord your God is with you.","es":"Esfuérzate y sé valiente; no temas, porque el Señor tu Dios está contigo.","it":"Sii forte e coraggioso; non temere, perché il Signore tuo Dio è con te.","src":"Josué 1,9"},
  {"pt":"Porque sou eu que conheço os planos que tenho para vós, planos de paz, não de infelicidade.","en":"For I know the plans I have for you, plans for peace, not for misfortune.","es":"Porque yo sé los planes que tengo para vosotros, planes de paz, no de desventura.","it":"Io so i progetti che ho per voi, progetti di pace, non di sventura.","src":"Jeremias 29,11"},
  {"pt":"Tudo quanto fizerdes, fazei-o de todo o coração, como para o Senhor.","en":"Whatever you do, do it with all your heart, as for the Lord.","es":"Todo lo que hagáis, hacedlo con todo el corazón, como para el Señor.","it":"Qualsiasi cosa facciate, fatela con tutto il cuore, come per il Signore.","src":"Colossenses 3,23"},
  {"pt":"Vinde a mim, todos os que estais cansados e sobrecarregados, e eu vos aliviarei.","en":"Come to me, all you who are weary and burdened, and I will give you rest.","es":"Venid a mí todos los que estáis cansados y cargados, y yo os aliviaré.","it":"Venite a me, voi tutti che siete affaticati e oppressi, e io vi ristorerò.","src":"Mateus 11,28"},
  {"pt":"O meu Deus proverá tudo o que vos faltar.","en":"My God will supply all that you lack.","es":"Mi Dios proveerá todo lo que os falte.","it":"Il mio Dio provvederà a tutto ciò che vi manca.","src":"Filipenses 4,19"},
  {"pt":"Lança sobre o Senhor os teus cuidados, e ele te sustentará.","en":"Cast your cares on the Lord, and he will sustain you.","es":"Echa sobre el Señor tus afanes, y él te sustentará.","it":"Getta sul Signore il tuo affanno, ed egli ti sosterrà.","src":"Salmo 55,23"},
  {"pt":"Alegrai-vos no Senhor sempre; torno a dizer: alegrai-vos!","en":"Rejoice in the Lord always; again I say, rejoice!","es":"¡Alegraos en el Señor siempre; otra vez lo digo: alegraos!","it":"Rallegratevi nel Signore sempre; lo ripeto: rallegratevi!","src":"Filipenses 4,4"},
  {"pt":"Confia no Senhor de todo o teu coração e não te apoies no teu próprio entendimento.","en":"Trust in the Lord with all your heart and lean not on your own understanding.","es":"Confía en el Señor con todo tu corazón y no te apoyes en tu propio entendimiento.","it":"Confida nel Signore con tutto il cuore e non ti appoggiare sulla tua inteligenza.","src":"Provérbios 3,5"},
  {"pt":"Eu posso todas as coisas naquele que me fortalece.","en":"I can do all things through him who strengthens me.","es":"Todo lo puedo en aquel que me fortalece.","it":"Tutto posso in colui che mi dà forza.","src":"Filipenses 4,13"},
  {"pt":"O Senhor é o meu pastor; nada me faltará.","en":"The Lord is my shepherd; I shall not want.","es":"El Señor es mi pastor, nada me faltará.","it":"Il Signore è mio pastore, non mi manca nulla.","src":"Salmo 23,1"},
  {"pt":"Buscai primeiro o Reino de Deus e a sua justiça, e o resto vos será dado por acréscimo.","en":"Seek first the Kingdom of God and his righteousness, and the rest will be given you besides.","es":"Buscad primero el Reino de Dios y su justicia, y lo demás se os dará por añadidura.","it":"Cercate prima il Regno di Dio e la sua giustizia, e il resto vi sarà dato in aggiunta.","src":"Mateus 6,33"},
  {"pt":"Não temas, porque eu te resgatei; chamei-te pelo teu nome: tu és meu.","en":"Do not fear, for I have redeemed you; I have called you by name: you are mine.","es":"No temas, porque yo te redimí; te llamé por tu nombre: tú eres mío.","it":"Non temere, perché ti ho redento; ti ho chiamato per nome: tu sei mio.","src":"Isaías 43,1"},
  {"pt":"O amor cobre a multidão dos pecados.","en":"Love covers a multitude of sins.","es":"El amor cubre la multitud de pecados.","it":"La carità copre la moltitudine dei peccati.","src":"1 Pedro 4,8"},
  {"pt":"Em tudo dai graças, porque esta é a vontade de Deus para convosco.","en":"In everything give thanks, for this is the will of God for you.","es":"En todo dad gracias, porque esta es la voluntad de Dios para con vosotros.","it":"In ogni cosa rendete grazie: questa è la volontà di Dio per voi.","src":"1 Tessalonicenses 5,18"},
  {"pt":"Aquele que habita no abrigo do Altíssimo, à sombra do Onipotente repousará.","en":"He who dwells in the shelter of the Most High will rest in the shadow of the Almighty.","es":"El que habita al abrigo del Altísimo, a la sombra del Omnipotente descansará.","it":"Chi abita al riparo dell'Altissimo, alla ombra dell'Onnipotente riposa.","src":"Salmo 91,1"},
  {"pt":"O Senhor é bom e a sua misericórdia é para sempre.","en":"The Lord is good and his mercy endures forever.","es":"Bueno es el Señor y su misericordia es para siempre.","it":"Buono è il Signore e la sua misericordia dura per sempre.","src":"Salmo 100,5"},
  {"pt":"Espera no Senhor, sê corajoso e fortifica o teu coração.","en":"Wait for the Lord; be courageous and strengthen your heart.","es":"Espera en el Señor, sé valiente y fuerte tu corazón.","it":"Spera nel Signore, sii coraggioso e saldo il tuo cuore.","src":"Salmo 27,14"},
  {"pt":"Porque onde está o teu tesouro, aí estará também o teu coração.","en":"For where your treasure is, there your heart will be also.","es":"Porque donde está tu tesoro, allí estará también tu corazón.","it":"Perché dove è il tuo tesoro, là sarà anche il tuo cuore.","src":"Mateus 6,21"},
  {"pt":"O Senhor é fiel; ele fortalecerá e protegerá.","en":"The Lord is faithful; he will strengthen and protect.","es":"El Señor es fiel: él te fortalecerá y protegerá.","it":"Il Signore è fedele: egli ti fortificherà e ti proteggerà.","src":"2 Tessalonicenses 3,3"},
  {"pt":"Deixa que a paz de Cristo governe o teu coração.","en":"Let the peace of Christ rule in your heart.","es":"Deja que la paz de Cristo gobierne tu corazón.","it":"Lascia che la pace di Cristo governi il tuo cuore.","src":"Colossenses 3,15"},
  {"pt":"Tudo coopera para o bem daqueles que amam a Deus.","en":"All things work together for the good of those who love God.","es":"Todo coopera para el bien de los que aman a Dios.","it":"Tutto concorre al bene di coloro che amano Dio.","src":"Romanos 8,28"},
  {"pt":"Eu sou a videira, vós os ramos; quem permanece em mim dá muito fruto.","en":"I am the vine, you are the branches; he who remains in me bears much fruit.","es":"Yo soy la vid, vosotros los pámpanos; el que permanece en mí da mucho fruto.","it":"Io sono la vite, voi i tralci; chi rimane in me porta molto frutto.","src":"João 15,5"},
  {"pt":"Confia no Senhor e espera nele; ele concederá os desejos do teu coração.","en":"Trust in the Lord and wait for him; he will grant the desires of your heart.","es":"Confía en el Señor y espera en él; él concederá los deseos de tu corazón.","it":"Confida nel Signore e spera in lui; egli concederà i desideri del tuo cuore.","src":"Salmo 37,4"},
  {"pt":"Bom é confiar no Senhor mais do que confiar no homem.","en":"It is good to trust in the Lord rather than to trust in man.","es":"Bueno es confiar en el Señor más que confiar en el hombre.","it":"È bello confidare nel Signore anziché confidare nell'uomo.","src":"Salmo 118,8"},
  {"pt":"O Senhor renova as tuas forças; subirás com asas como as águias.","en":"The Lord renews your strength; you will soar on wings like eagles.","es":"El Señor renueva tus fuerzas; remontarás con alas como las águilas.","it":"Il Signore rinnova le tue forze; salirai con ali come aquile.","src":"Isaías 40,31"},
  {"pt":"A tua palavra é lâmpada para os meus pés e luz para o meu caminho.","en":"Your word is a lamp to my feet and a light to my path.","es":"Tu palabra es lámpara para mis pies y luz para mi camino.","it":"La tua parola è lampada ai miei passi e luce al mio sentiero.","src":"Salmo 119,105"},
  {"pt":"Invoca-me e eu te responderei; anunciar-te-ei coisas grandes e ocultas.","en":"Call to me and I will answer you; I will tell you great and hidden things.","es":"Invócame y yo te responderé; te anunciaré cosas grandes y ocultas.","it":"Invocami e io ti risponderò; ti annuncerò cose grandi e nascoste.","src":"Jeremias 33,3"},
  {"pt":"A alegria do Senhor é a vossa força.","en":"The joy of the Lord is your strength.","es":"La alegría del Señor es vuestra fortaleza.","it":"La gioia del Signore è la vostra forza.","src":"Neemias 8,10"},
  {"pt":"Deus é o nosso refúgio e a nossa força, socorro bem presente na angústia.","en":"God is our refuge and strength, a very present help in trouble.","es":"Dios es nuestro refugio y nuestra fortaleza, socorro siempre presente en la angustia.","it":"Dio è nostro rifugio e nostra forza, aiuto sempre vicino nella sventura.","src":"Salmo 46,2"},
  {"pt":"Eu vos deixo a paz, a minha paz vos dou.","en":"Peace I leave with you; my peace I give to you.","es":"Os dejo la paz, mi paz os doy.","it":"Vi lascio la pace, la mia pace io do a voi.","src":"João 14,27"},
  {"pt":"Aquele que começou em vós a boa obra, há de completá-la.","en":"He who began the good work in you will complete it.","es":"El que comenzó en vosotros la buena obra, la perfeccionará.","it":"Colui che ha iniziato in voi la buona opera, la compirà.","src":"Filipenses 1,6"},
  {"pt":"Não se turbe o vosso coração; credes em Deus, crede também em mim.","en":"Do not let your heart be troubled; believe in God, believe also in me.","es":"No se turbe vuestro corazón; creed en Dios, creed también en mí.","it":"Non si turbi il vostro cuore; credete in Dio, credete anche in me.","src":"João 14,1"},
  {"pt":"Maior do que o que está no mundo é aquele que está em vós.","en":"Greater is he who is in you than he who is in the world.","es":"Mayor es el que está en vosotros que el que está en el mundo.","it":"Più grande è colui che è in voi di colui che è nel mondo.","src":"1 João 4,4"},
  {"pt":"O Senhor combaterá por vós; vós apenas descansai.","en":"The Lord will fight for you; you need only be still.","es":"El Señor combatirá por vosotros; vosotros estad quietos.","it":"Il Signore combatterà per voi; voi state tranquilli.","src":"Êxodo 14,14"},
  {"pt":"Esforça-te e tem bom ânimo, porque o Senhor fará o que prometeu.","en":"Be strong and courageous, for the Lord will do what he has promised.","es":"Esfuérzate y sé valiente, porque el Señor cumplirá lo que prometió.","it":"Sii forte e coraggioso, perché il Signore compirà quanto ha promesso.","src":"Josué 23,14"},
  {"pt":"Lança o teu caminho sobre o Senhor e ele cuidará de ti.","en":"Commit your way to the Lord, and he will care for you.","es":"Encomienda a el Señor tu camino y él se cuidará de ti.","it":"Affida al Signore la tua via ed egli avrà cura di te.","src":"Salmo 37,5"},
  {"pt":"Aquele que semeia com lágrimas, com alegria ceifará.","en":"He who sows in tears shall reap with joy.","es":"El que siembra con lágrimas, con alegría segará.","it":"Chi semina fra le lacrime, miete con gioia.","src":"Salmo 126,5"},
  {"pt":"O Senhor te abençoe e te guarde; o Senhor faça brilhar sobre ti o seu rosto.","en":"The Lord bless you and keep you; the Lord make his face shine upon you.","es":"El Señor te bendiga y te guarde; el Señor haga brillar sobre ti su rostro.","it":"Il Signore ti benedica e ti custodisca; il Signore faccia splendere su di te il suo volto.","src":"Números 6,24-25"},
  {"pt":"Porque para Deus nada é impossível.","en":"For with God nothing is impossible.","es":"Porque para Dios nada hay imposible.","it":"Perché nulla è impossibile a Dio.","src":"Lucas 1,37"},
  {"pt":"Vinde, subamos ao monte do Senhor; ele nos ensinará os seus caminhos.","en":"Come, let us go up to the mountain of the Lord; he will teach us his ways.","es":"Venid, subamos al monte del Señor; él nos enseñará sus caminos.","it":"Venite, saliamo al monte del Signore; egli ci insegnerà le sue vie.","src":"Miquéias 4,2"},
  {"pt":"O Senhor é a força do seu povo e a defesa salvadora do seu ungido.","en":"The Lord is the strength of his people and the saving defense of his anointed.","es":"El Señor es la fuerza de su pueblo y la defensa salvadora de su ungido.","it":"Il Signore è la forza del suo popolo e la difesa salvifica del suo consacrato.","src":"Salmo 28,8"},
  {"pt":"Em Cristo somos mais que vencedores.","en":"In Christ we are more than conquerors.","es":"En Cristo somos más que vencedores.","it":"In Cristo siamo più che vincitori.","src":"Romanos 8,37"},
  {"pt":"Deixai vir a mim as criancinhas, porque delas é o Reino dos céus.","en":"Let the little children come to me, for theirs is the Kingdom of heaven.","es":"Dejad que los niños vengan a mí, porque de ellos es el Reino de los cielos.","it":"Lasciate che i bambini vengano a me, perché di essi è il Regno dei cieli.","src":"Mateus 19,14"},
  {"pt":"Buscai o Senhor enquanto se pode encontrar; invocai-o enquanto está perto.","en":"Seek the Lord while he may be found; call upon him while he is near.","es":"Buscad al Señor mientras puede ser hallado; llamadlo mientras está cerca.","it":"Cercate il Signore mentre si lascia trovare; invocatelo mentre è vicino.","src":"Isaías 55,6"},
  {"pt":"O Senhor é bom para com aqueles que esperam por ele.","en":"The Lord is good to those who wait for him.","es":"Bueno es el Señor para con los que esperan en él.","it":"Buono è il Signore verso chi spera in lui.","src":"Lamentações 3,25"},
  {"pt":"Tudo o que pedirdes em oração, crendo, recebereis.","en":"Whatever you ask in prayer, believing, you will receive.","es":"Todo lo que pidáis en oración, creyendo, lo recibiréis.","it":"Tutto ciò che chiederete con la preghiera, credendo, lo riceverete.","src":"Mateus 21,22"},
  {"pt":"Eu sou a ressurreição e a vida.","en":"I am the resurrection and the life.","es":"Yo soy la resurrección y la vida.","it":"Io sono la risurrezione e la vita.","src":"João 11,25"},
  {"pt":"O meu povo será farto da bondade do Senhor.","en":"My people will be filled with the goodness of the Lord.","es":"Mi pueblo se saciará de la bondad del Señor.","it":"Il mio popolo sarà saziato della bontà del Signore.","src":"Jeremias 31,14"},
  {"pt":"O Senhor te guarda, o Senhor é a tua sombra à tua direita.","en":"The Lord watches over you; the Lord is your shade at your right hand.","es":"El Señor te guarda, el Señor es tu sombra a tu derecha.","it":"Il Signore ti custodisce, il Signore è la tua ombra alla tua destra.","src":"Salmo 121,5"},
  {"pt":"Aquele que confia no Senhor será como a árvore plantada junto às águas.","en":"He who trusts in the Lord will be like a tree planted by the waters.","es":"El que confía en el Señor será como árbol plantado junto a las aguas.","it":"Chi confida nel Signore sarà come albero piantato presso le acque.","src":"Jeremias 17,8"},
  {"pt":"O Senhor é a minha rocha, a minha fortaleza e o meu libertador.","en":"The Lord is my rock, my fortress and my deliverer.","es":"El Señor es mi roca, mi fortaleza y mi libertador.","it":"Il Signore è la mia roccia, la mia fortezza e il mio liberatore.","src":"Salmo 18,3"},
  {"pt":"Espera no Senhor; ele exaltará o teu coração ao seu tempo.","en":"Wait for the Lord; he will lift up your heart in his time.","es":"Espera en el Señor; él exaltará tu corazón a su tiempo.","it":"Spera nel Signore; egli innalzerà il tuo cuore al suo tempo.","src":"Salmo 37,34"},
  {"pt":"Deus amou tanto o mundo que deu o seu Filho unigénito.","en":"God so loved the world that he gave his only Son.","es":"Tanto amó Dios al mundo que dio a su Hijo unigénito.","it":"Dio ha tanto amato il mondo da dare il suo Figlio unigenito.","src":"João 3,16"},
  {"pt":"O Senhor é o meu auxílio; não temerei o que me possa fazer o homem.","en":"The Lord is my helper; I will not fear what man can do to me.","es":"El Señor es mi auxilio; no temeré lo que me pueda hacer el hombre.","it":"Il Signore è il mio aiuto; non temerò ciò che l'uomo possa farmi.","src":"Salmo 118,6"},
  {"pt":"A vossa recompensa é grande nos céus.","en":"Your reward is great in heaven.","es":"Vuestra recompensa es grande en los cielos.","it":"La vostra ricompensa è grande nei cieli.","src":"Mateus 5,12"},
  {"pt":"Fazei o bem sem desanimar, porque a seu tempo ceifaremos se não nos cansarmos.","en":"Do good without growing weary, for in due season we will reap if we do not give up.","es":"Haced el bien sin desanimaros, porque a su tiempo segaréis si no os cansáis.","it":"Fate il bene senza stancarvi, perché a suo tempo mieteremo se non ci scoraggiamo.","src":"Gálatas 6,9"},
  {"pt":"O Senhor é compassivo e cheio de misericórdia.","en":"The Lord is compassionate and full of mercy.","es":"El Señor es compasivo y lleno de misericordia.","it":"Il Signore è misericordioso e pieno di clemenza.","src":"Tiago 5,11"},
  {"pt":"Correi de tal modo que alcanceis o prémio.","en":"Run in such a way that you may obtain the prize.","es":"Corred de tal manera que alcancéis el premio.","it":"Correte in modo da conquistare il premio.","src":"1 Coríntios 9,24"},
  {"pt":"Aquele que crê em mim, mesmo que morra, viverá.","en":"He who believes in me, though he die, shall live.","es":"El que cree en mí, aunque muera, vivirá.","it":"Chi crede in me, anche se muore, vivrà.","src":"João 11,25-26"},
  {"pt":"O Senhor dá força aos cansados e aumenta o vigor dos que não têm poder.","en":"The Lord gives strength to the weary and increases the power of the weak.","es":"El Señor da fuerza al cansado y aumenta el vigor del que no tiene poder.","it":"Il Signore dà forza all'affaticato e accresce il vigore di chi non ha potenza.","src":"Isaías 40,29"},
  {"pt":"Permanecei em mim, como eu permaneço em vós.","en":"Remain in me, as I remain in you.","es":"Permaneced en mí, como yo permanezco en vosotros.","it":"Rimanete in me, come io rimango in voi.","src":"João 15,4"},
  {"pt":"Aquele que semeia na benção, na benção ceifará.","en":"He who sows with blessing will reap with blessing.","es":"El que siembra en bendición, en bendición segará.","it":"Chi semina nella benedizione, nella benedizione miete.","src":"2 Coríntios 9,6"},
  {"pt":"O Senhor é a minha herança e o meu cálice; tu sustentas a minha sorte.","en":"The Lord is my portion and my cup; you sustain my lot.","es":"El Señor es mi heredad y mi cálice; tú sustentas mi suerte.","it":"Il Signore è la mia eredità e il mio calice; tu sostieni la mia sorte.","src":"Salmo 16,5"},
  {"pt":"Não é bastante ter o coração em Deus; é preciso pô-lo também nos homens.","en":"It is not enough to have one's heart in God; it must also be placed in men.","es":"No basta tener el corazón en Dios; es preciso ponerlo también en los hombres.","it":"Non basta avere il cuore in Dio; bisogna porlo anche negli uomini.","src":"São Josemaria Escrivá"},
  {"pt":"Quando cumpris o dever por dever, enches a alma de luz.","en":"When you fulfill duty for duty's sake, you fill your soul with light.","es":"Cuando cumples el deber por deber, llenas el alma de luz.","it":"Quando adempi il dovere per amore del dovere, riempi l'anima di luce.","src":"São Josemaria Escrivá"},
  {"pt":"A oração é a chave que abre o coração de Deus.","en":"Prayer is the key that opens the heart of God.","es":"La oración es la llave que abre el corazón de Dios.","it":"La preghiera è la chiave che apre il cuore di Dio.","src":"São Josemaria Escrivá"},
  {"pt":"Ama a Deus e leva uma vida corrente, sem nada de estranho nem de excêntrico.","en":"Love God and live an ordinary life, with nothing strange or eccentric.","es":"Ama a Dios y lleva una vida corriente, sin nada de extraño ni de excéntrico.","it":"Ama Dio e conduci una vita ordinaria, senza nulla di strano né di eccentrico.","src":"São Josemaria Escrivá"},
  {"pt":"O trabalho santificado é oração feita vida.","en":"Sanctified work is prayer made life.","es":"El trabajo santificado es la oración hecha vida.","it":"Il lavoro santificato è la preghiera fatta vita.","src":"São Josemaria Escrivá"},
  {"pt":"Não procures a paz fora de ti; está no teu coração bem ordenado.","en":"Do not seek peace outside yourself; it lies in your well-ordered heart.","es":"No busques la paz fuera de ti; está en tu corazón bien ordenado.","it":"Non cercare la pace fuori di te; sta nel tuo cuore ben ordinato.","src":"São Josemaria Escrivá"},
  {"pt":"Se amas a Deus, hás de procurar que os outros o amem também.","en":"If you love God, you must strive that others love him too.","es":"Si amas a Dios, has de procurar que los demás lo amen también.","it":"Se ami Dio, devi cercare che anche gli altri lo amino.","src":"São Josemaria Escrivá"},
  {"pt":"A humildade é a verdade: reconhecer o que somos diante de Deus.","en":"Humility is truth: recognizing what we are before God.","es":"La humildad es la verdad: reconocer lo que somos delante de Dios.","it":"L'umiltà è la verità: riconoscere ciò che siamo davanti a Dio.","src":"São Josemaria Escrivá"},
  {"pt":"Não te esqueças: a tua missão no mundo é santificar o trabalho.","en":"Do not forget: your mission in the world is to sanctify your work.","es":"No olvides: tu misión en el mundo es santificar el trabajo.","it":"Non dimenticare: la tua missione nel mondo è santificare il lavoro.","src":"São Josemaria Escrivá"},
  {"pt":"Não há santidade sem cruz; a cruz é o trono do amor.","en":"There is no holiness without the cross; the cross is the throne of love.","es":"No hay santidad sin cruz; la cruz es el trono del amor.","it":"Non c'è santità senza croce; la croce è il trono dell'amore.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres ser santo, começa por ser leal.","en":"If you want to be a saint, begin by being faithful.","es":"Si quieres ser santo, empieza por ser leal.","it":"Se vuoi essere santo, comincia dall'essere leale.","src":"São Josemaria Escrivá"},
  {"pt":"O cristão é um outro Cristo: ele há de agir como Cristo.","en":"The Christian is another Christ: he must act as Christ.","es":"El cristiano es otro Cristo: ha de obrar como Cristo.","it":"Il cristiano è un altro Cristo: deve operare come Cristo.","src":"São Josemaria Escrivá"},
  {"pt":"Não digas que não tens tempo para rezar; tens tempo para tudo, menos para isso?","en":"Do not say you have no time to pray; you have time for everything but that?","es":"No digas que no tienes tiempo para rezar; ¿tienes tiempo para todo, menos para eso?","it":"Non dire di non avere tempo per pregare; hai tempo per tutto, meno che per questo?","src":"São Josemaria Escrivá"},
  {"pt":"A mortificação não é tristeza, é amor que renuncia.","en":"Mortification is not sadness; it is love that renounces.","es":"La mortificación no es tristeza, es amor que renuncia.","it":"La mortificazione non è tristezza, è amore che rinuncia.","src":"São Josemaria Escrivá"},
  {"pt":"Tudo o que fazes, faze-o com amor, e serás santo.","en":"Whatever you do, do it with love, and you will be a saint.","es":"Todo lo que haces, hazlo con amor, y serás santo.","it":"Tutto ciò che fai, fallo con amore, e sarai santo.","src":"São Josemaria Escrivá"},
  {"pt":"A provação é a medida do amor de Deus por ti.","en":"Trials are the measure of God's love for you.","es":"La prueba es la medida del amor de Dios por ti.","it":"La prova è la misura dell'amore di Dio per te.","src":"São Josemaria Escrivá"},
  {"pt":"Não te deixes vencer pelo ambiente; vence tu o ambiente.","en":"Do not let yourself be overcome by the environment; overcome the environment yourself.","es":"No te dejes vencer por el ambiente; vence tú el ambiente.","it":"Non ti lasciare vincere dall'ambiente; vinci tu l'ambiente.","src":"São Josemaria Escrivá"},
  {"pt":"A vida interior não é um luxo, é uma necessidade.","en":"The interior life is not a luxury; it is a necessity.","es":"La vida interior no es un lujo, es una necesidad.","it":"La vita interiore non è un lusso, è una necessità.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres paz, sê fiel à tua oração.","en":"If you want peace, be faithful to your prayer.","es":"Si quieres paz, sé fiel a tu oración.","it":"Se vuoi pace, sii fedele alla tua preghiera.","src":"São Josemaria Escrivá"},
  {"pt":"O trabalho bem feito é oração de louvor.","en":"Work well done is a prayer of praise.","es":"El trabajo bien hecho es oración de alabanza.","it":"Il lavoro ben fatto è preghiera di lode.","src":"São Josemaria Escrivá"},
  {"pt":"Não tenhas medo da santidade; é o melhor remédio contra a mediocridade.","en":"Do not be afraid of holiness; it is the best remedy against mediocrity.","es":"No tengas miedo de la santidad; es el mejor remedio contra la mediocridad.","it":"Non aver paura della santità; è il miglior rimedio contro la mediocrità.","src":"São Josemaria Escrivá"},
  {"pt":"A caridade é paciente porque é divina.","en":"Charity is patient because it is divine.","es":"La caridad es paciente porque es divina.","it":"La carità è paziente perché è divina.","src":"São Josemaria Escrivá"},
  {"pt":"Se não sabes sofrer, não sabes amar.","en":"If you do not know how to suffer, you do not know how to love.","es":"Si no sabes sufrir, no sabes amar.","it":"Se non sai soffrire, non sai amare.","src":"São Josemaria Escrivá"},
  {"pt":"A fé sem obras é um corpo sem alma.","en":"Faith without works is a body without a soul.","es":"La fe sin obras es un cuerpo sin alma.","it":"La fede senza opere è un corpo senza anima.","src":"São Josemaria Escrivá"},
  {"pt":"Não procures consolações; procura dar consolo.","en":"Do not seek consolations; seek to give comfort.","es":"No busques consolaciones; busca dar consuelo.","it":"Non cercare consolazioni; cerca di dare conforto.","src":"São Josemaria Escrivá"},
  {"pt":"A verdade liberta, mas primeiro fere.","en":"The truth sets free, but first it wounds.","es":"La verdad libera, pero primero hiere.","it":"La verità libera, ma prima ferisce.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres agradar a Deus, serve aos que estão ao teu lado.","en":"If you want to please God, serve those at your side.","es":"Si quieres agradar a Dios, sirve a los que están a tu lado.","it":"Se vuoi piacere a Dio, servi chi ti sta accanto.","src":"São Josemaria Escrivá"},
  {"pt":"A disciplina é aradeira que abre a terra do coração.","en":"Discipline is the plow that opens the soil of the heart.","es":"La disciplina es el arado que abre la tierra del corazón.","it":"La disciplina è l'aratro che apre la terra del cuore.","src":"São Josemaria Escrivá"},
  {"pt":"Não te compares com os outros; compara-te com o que deves ser.","en":"Do not compare yourself with others; compare yourself with what you ought to be.","es":"No te compares con los demás; compárate con lo que debes ser.","it":"Non paragonarti agli altri; paragonati a ciò che devi essere.","src":"São Josemaria Escrivá"},
  {"pt":"A oração bem vivida leva ao apostolado.","en":"Prayer well lived leads to apostolate.","es":"La oración bien vivida lleva al apostolado.","it":"La preghiera ben vissuta conduce all'apostolato.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres ser útil, esquece-te de ti.","en":"If you want to be useful, forget yourself.","es":"Si quieres ser útil, olvídate de ti.","it":"Se vuoi essere utile, dimenticati di te.","src":"São Josemaria Escrivá"},
  {"pt":"A soberba é a raiz de todos os males.","en":"Pride is the root of all evils.","es":"El orgullo es la raíz de todos los males.","it":"L'orgoglio è la radice di tutti i mali.","src":"São Josemaria Escrivá"},
  {"pt":"Não digas nunca que não podes; diz que ainda não aprendeste.","en":"Never say you cannot; say you have not yet learned.","es":"Nunca digas que no puedes; di que todavía no has aprendido.","it":"Non dire mai che non puoi; di che non hai ancora imparato.","src":"São Josemaria Escrivá"},
  {"pt":"A alegria cristã nasce de saber-se amado por Deus.","en":"Christian joy is born of knowing oneself loved by God.","es":"La alegría cristiana nace de saberse amado por Dios.","it":"La gioia cristiana nasce dal sapere di essere amati da Dio.","src":"São Josemaria Escrivá"},
  {"pt":"Se amas deveras, não contas os sacrifícios.","en":"If you truly love, you do not count the sacrifices.","es":"Si amas de verdad, no cuentas los sacrificios.","it":"Se ami davvero, non conti i sacrifici.","src":"São Josemaria Escrivá"},
  {"pt":"A obediência é a virtude dos que amam a vontade de Deus.","en":"Obedience is the virtue of those who love the will of God.","es":"La obediencia es la virtud de los que aman la voluntad de Dios.","it":"L'obbedienza è la virtù di chi ama la volontà di Dio.","src":"São Josemaria Escrivá"},
  {"pt":"Não tenhas pressa; a obra de Deus faz-se com calma.","en":"Do not be in a hurry; the work of God is done calmly.","es":"No tengas prisa; la obra de Dios se hace con calma.","it":"Non aver fretta; l'opera di Dio si compie con calma.","src":"São Josemaria Escrivá"},
  {"pt":"A pureza é fruto da oração e da mortificação.","en":"Purity is the fruit of prayer and mortification.","es":"La pureza es fruto de la oración y de la mortificación.","it":"La purezza è frutto della preghiera e della mortificazione.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres paz, perdoa primeiro.","en":"If you want peace, forgive first.","es":"Si quieres paz, perdona primero.","it":"Se vuoi pace, perdona prima.","src":"São Josemaria Escrivá"},
  {"pt":"A esperança é a virtude dos que caminham na escuridão com a luz de Deus.","en":"Hope is the virtue of those who walk in darkness with the light of God.","es":"La esperanza es la virtud de los que caminan en la oscuridad con la luz de Dios.","it":"La speranza è la virtù di chi cammina nelle tenebre con la luce di Dio.","src":"São Josemaria Escrivá"},
  {"pt":"Não te escondas atrás do dever; cumpre-o com alegria.","en":"Do not hide behind duty; fulfill it with joy.","es":"No te escondas detrás del deber; cúmplelo con alegría.","it":"Non nascondereti dietro il dovere; adempilo con gioia.","src":"São Josemaria Escrivá"},
  {"pt":"A caridade começa em casa, mas não acaba aí.","en":"Charity begins at home, but does not end there.","es":"La caridad empieza en casa, pero no acaba ahí.","it":"La carità inizia in casa, ma non finisce lì.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres ser grande, sê pequeno.","en":"If you want to be great, be small.","es":"Si quieres ser grande, sé pequeño.","it":"Se vuoi essere grande, sii piccolo.","src":"São Josemaria Escrivá"},
  {"pt":"A oração não é fuga do mundo, é força para o mundo.","en":"Prayer is not flight from the world; it is strength for the world.","es":"La oración no es huida del mundo, es fuerza para el mundo.","it":"La preghiera non è fuga dal mondo, è forza per il mondo.","src":"São Josemaria Escrivá"},
  {"pt":"Não digas que rezas pouco; dize que amas pouco.","en":"Do not say you pray little; say you love little.","es":"No digas que rezas poco; di que amas poco.","it":"Non dire che preghi poco; di che ami poco.","src":"São Josemaria Escrivá"},
  {"pt":"A fidelidade nas coisas pequenas é o segredo das grandes.","en":"Faithfulness in small things is the secret of great ones.","es":"La fidelidad en las cosas pequeñas es el secreto de las grandes.","it":"La fedeltà nelle piccole cose è il segreto delle grandi.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres agradar a Deus, faze bem o que fazes.","en":"If you want to please God, do well what you do.","es":"Si quieres agradar a Dios, haz bien lo que haces.","it":"Se vuoi piacere a Dio, fa' bene ciò che fai.","src":"São Josemaria Escrivá"},
  {"pt":"A humildade não é pensar mal de si, mas não pensar em si.","en":"Humility is not thinking ill of oneself, but not thinking of oneself.","es":"La humildad no es pensar mal de sí, sino no pensar en sí.","it":"L'umiltà non è pensare male di sé, ma non pensare a sé.","src":"São Josemaria Escrivá"},
  {"pt":"Não tenhas medo do amor; Deus é amor.","en":"Do not be afraid of love; God is love.","es":"No tengas miedo del amor; Dios es amor.","it":"Non aver paura dell'amore; Dio è amore.","src":"São Josemaria Escrivá"},
  {"pt":"A santidade está ao alcance de todos, em qualquer estado.","en":"Holiness is within everyone's reach, in any state of life.","es":"La santidad está al alcance de todos, en cualquier estado.","it":"La santità è alla portata di tutti, in qualsiasi stato.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres a paz, ordena a tua vida.","en":"If you want peace, put your life in order.","es":"Si quieres la paz, ordena tu vida.","it":"Se vuoi la pace, ordina la tua vita.","src":"São Josemaria Escrivá"},
  {"pt":"A mortificação é a saúde da alma.","en":"Mortification is the health of the soul.","es":"La mortificación es la salud del alma.","it":"La mortificazione è la salute dell'anima.","src":"São Josemaria Escrivá"},
  {"pt":"Não procures ser original; procura ser santo.","en":"Do not seek to be original; seek to be a saint.","es":"No busques ser original; busca ser santo.","it":"Non cercare di essere originale; cerca di essere santo.","src":"São Josemaria Escrivá"},
  {"pt":"A alegria atrai; o mau humor afasta.","en":"Joy attracts; bad humor drives away.","es":"La alegría atrae; el mal humor aleja.","it":"La gioia attira; il cattivo umore allontana.","src":"São Josemaria Escrivá"},
  {"pt":"Se amas a Deus, hás de ser homem de palavra.","en":"If you love God, you must be a man of your word.","es":"Si amas a Dios, has de ser hombre de palabra.","it":"Se ami Dio, devi essere un uomo di parola.","src":"São Josemaria Escrivá"},
  {"pt":"A oração é diálogo de amizade com Deus.","en":"Prayer is a friendship dialogue with God.","es":"La oración es diálogo de amistad con Dios.","it":"La preghiera è dialogo di amicizia con Dio.","src":"São Josemaria Escrivá"},
  {"pt":"Não te deixes abater pelo fracasso; recomeça.","en":"Do not be crushed by failure; begin again.","es":"No te dejes abatir por el fracaso; recomienza.","it":"Non lasciarti abbattere dal fallimento; ricomincia.","src":"São Josemaria Escrivá"},
  {"pt":"A caridade é olhar os outros com os olhos de Cristo.","en":"Charity is to look at others with the eyes of Christ.","es":"La caridad es mirar a los demás con los ojos de Cristo.","it":"La carità è guardare gli altri con gli occhi di Cristo.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres ser santo, sé homem de oração.","en":"If you want to be a saint, be a man of prayer.","es":"Si quieres ser santo, sé hombre de oración.","it":"Se vuoi essere santo, sii un uomo di preghiera.","src":"São Josemaria Escrivá"},
  {"pt":"A verdadeira contrição nasce de amor, não de medo.","en":"True contrition is born of love, not of fear.","es":"La verdadera contrición nace del amor, no del miedo.","it":"La vera contrizione nasce dall'amore, non dalla paura.","src":"São Josemaria Escrivá"},
  {"pt":"Não tenhas medo do trabalho; é o teu caminho de santidade.","en":"Do not be afraid of work; it is your path to holiness.","es":"No tengas miedo del trabajo; es tu camino de santidad.","it":"Non aver paura del lavoro; è la tua via di santità.","src":"São Josemaria Escrivá"},
  {"pt":"A paciência vence tudo o que a violência não vence.","en":"Patience conquers all that violence does not.","es":"La paciencia vence todo lo que la violencia no vence.","it":"La pazienza vince tutto ciò che la violenza non vince.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres agradar a Deus, aceita a tua cruz.","en":"If you want to please God, accept your cross.","es":"Si quieres agradar a Dios, acepta tu cruz.","it":"Se vuoi piacere a Dio, accetta la tua croce.","src":"São Josemaria Escrivá"},
  {"pt":"A generosidade com Deus não conhece meio-termo.","en":"Generosity with God knows no middle ground.","es":"La generosidad con Dios no conoce término medio.","it":"La generosità con Dio non conosce compromessi.","src":"São Josemaria Escrivá"},
  {"pt":"Não digas que não tens tempo; dá prioridade a Deus.","en":"Do not say you have no time; give God priority.","es":"No digas que no tienes tiempo; da prioridad a Dios.","it":"Non dire di non avere tempo; dai priorità a Dio.","src":"São Josemaria Escrivá"},
  {"pt":"A fé viva transforma o trabalho em oração.","en":"Living faith transforms work into prayer.","es":"La fe viva transforma el trabajo en oración.","it":"La fede viva trasforma il lavoro in preghiera.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres ser livre, sê fiel.","en":"If you want to be free, be faithful.","es":"Si quieres ser libre, sé fiel.","it":"Se vuoi essere libero, sii fedele.","src":"São Josemaria Escrivá"},
  {"pt":"A mortificação sem alegria é tristeza, não virtude.","en":"Mortification without joy is sadness, not virtue.","es":"La mortificación sin alegría es tristeza, no virtud.","it":"La mortificazione senza gioia è tristezza, non virtù.","src":"São Josemaria Escrivá"},
  {"pt":"Não te compares com os santos para desanimar; compara-te para subir.","en":"Do not compare yourself with the saints to be discouraged; compare to rise.","es":"No te compares con los santos para desanimarte; compárate para subir.","it":"Non paragonarti ai santi per scoraggiarti; paragonati per salire.","src":"São Josemaria Escrivá"},
  {"pt":"A oração constante é o respiro da alma.","en":"Constant prayer is the breath of the soul.","es":"La oración constante es el aliento del alma.","it":"La preghiera costante è il respiro dell'anima.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres a paz, foge da murmuração.","en":"If you want peace, flee from grumbling.","es":"Si quieres la paz, huye de la murmuración.","it":"Se vuoi pace, fuggi dalla mormorazione.","src":"São Josemaria Escrivá"},
  {"pt":"A caridade é serviço silencioso e eficaz.","en":"Charity is silent and effective service.","es":"La caridad es servicio silencioso y eficaz.","it":"La carità è servizio silenzioso ed efficace.","src":"São Josemaria Escrivá"},
  {"pt":"Não tenhas medo das dificuldades; são degraus.","en":"Do not be afraid of difficulties; they are steps.","es":"No tengas miedo de las dificultades; son peldaños.","it":"Non aver paura delle difficoltà; sono gradini.","src":"São Josemaria Escrivá"},
  {"pt":"A humildade é a base de todas as virtudes.","en":"Humility is the foundation of all virtues.","es":"La humildad es la base de todas las virtudes.","it":"L'umiltà è la base di tutte le virtù.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres agradar a Deus, sê pontual.","en":"If you want to please God, be punctual.","es":"Si quieres agradar a Dios, sé puntual.","it":"Se vuoi piacere a Dio, sii puntuale.","src":"São Josemaria Escrivá"},
  {"pt":"A alegria é sinal de que Deus reina em ti.","en":"Joy is a sign that God reigns in you.","es":"La alegría es señal de que Dios reina en ti.","it":"La gioia è segno che Dio regna in te.","src":"São Josemaria Escrivá"},
  {"pt":"Não procures conselho de quem não reza.","en":"Do not seek advice from one who does not pray.","es":"No busques consejo de quien no reza.","it":"Non cercare consiglio da chi non prega.","src":"São Josemaria Escrivá"},
  {"pt":"A santidade é simples, como o Evangelho.","en":"Holiness is simple, like the Gospel.","es":"La santidad es sencilla, como el Evangelio.","it":"La santità è semplice, come il Vangelo.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres ser útil à Igreja, sê santo.","en":"If you want to be useful to the Church, be a saint.","es":"Si quieres ser útil a la Iglesia, sé santo.","it":"Se vuoi essere utile alla Chiesa, sii santo.","src":"São Josemaria Escrivá"},
  {"pt":"A oração dá luz ao entendimento e força à vontade.","en":"Prayer gives light to the understanding and strength to the will.","es":"La oración da luz al entendimiento y fuerza a la voluntad.","it":"La preghiera dà luce all'intelletto e forza alla volontà.","src":"São Josemaria Escrivá"},
  {"pt":"Não tenhas medo de pedir; Deus dá ao que pede.","en":"Do not be afraid to ask; God gives to those who ask.","es":"No tengas miedo de pedir; Dios da al que pide.","it":"Non aver paura di chiedere; Dio dà a chi chiede.","src":"São Josemaria Escrivá"},
  {"pt":"A caridade não é palavras, é obras.","en":"Charity is not words; it is deeds.","es":"La caridad no es palabras, es obras.","it":"La carità non è parole, è opere.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres paz, vive na presença de Deus.","en":"If you want peace, live in the presence of God.","es":"Si quieres paz, vive en la presencia de Dios.","it":"Se vuoi pace, vivi nella presenza di Dio.","src":"São Josemaria Escrivá"},
  {"pt":"A fidelidade é a virtude dos que amam.","en":"Faithfulness is the virtue of those who love.","es":"La fidelidad es la virtud de los que aman.","it":"La fedeltà è la virtù di chi ama.","src":"São Josemaria Escrivá"},
  {"pt":"Não te iludas: sem oração não há santidade.","en":"Do not deceive yourself: without prayer there is no holiness.","es":"No te ilusiones: sin oración no hay santidad.","it":"Non illuderti: senza preghiera non c'è santità.","src":"São Josemaria Escrivá"},
  {"pt":"A alegria do cristão é fruto do Espírito.","en":"The Christian's joy is the fruit of the Spirit.","es":"La alegría del cristiano es fruto del Espíritu.","it":"La gioia del cristiano è frutto dello Spirito.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres agradar a Deus, sorri.","en":"If you want to please God, smile.","es":"Si quieres agradar a Dios, sonríe.","it":"Se vuoi piacere a Dio, sorridi.","src":"São Josemaria Escrivá"},
  {"pt":"A humildade faz grandes as pequenas coisas.","en":"Humility makes small things great.","es":"La humildad hace grandes las cosas pequeñas.","it":"L'umiltà rende grandi le piccole cose.","src":"São Josemaria Escrivá"},
  {"pt":"Não tenhas medo do futuro; Deus já lá está.","en":"Do not be afraid of the future; God is already there.","es":"No tengas miedo del futuro; Dios ya está allí.","it":"Non aver paura del futuro; Dio è già là.","src":"São Josemaria Escrivá"},
  {"pt":"A oração é o remédio da tibieza.","en":"Prayer is the remedy for lukewarmness.","es":"La oración es el remedio de la tibieza.","it":"La preghiera è il rimedio della tiepidezza.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres ser santo, começa hoje.","en":"If you want to be a saint, begin today.","es":"Si quieres ser santo, empieza hoy.","it":"Se vuoi essere santo, comincia oggi.","src":"São Josemaria Escrivá"},
  {"pt":"A caridade não busca o seu próprio interesse.","en":"Charity does not seek its own interest.","es":"La caridad no busca su propio interés.","it":"La carità non cerca il proprio interesse.","src":"São Josemaria Escrivá"},
  {"pt":"Não te deixes vencer pelo tédio; trabalha com amor.","en":"Do not let yourself be overcome by boredom; work with love.","es":"No te dejes vencer por el tedio; trabaja con amor.","it":"Non lasciarti vincere dalla noia; lavora con amore.","src":"São Josemaria Escrivá"},
  {"pt":"A santidade é para todos, não para uns poucos.","en":"Holiness is for all, not for a few.","es":"La santidad es para todos, no para unos pocos.","it":"La santità è per tutti, non per pochi.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres a paz, aceita a vontade de Deus.","en":"If you want peace, accept the will of God.","es":"Si quieres la paz, acepta la voluntad de Dios.","it":"Se vuoi pace, accetta la volontà di Dio.","src":"São Josemaria Escrivá"},
  {"pt":"A oração bem feita muda a vida.","en":"Prayer well made changes life.","es":"La oración bien hecha cambia la vida.","it":"La preghiera ben fatta cambia la vita.","src":"São Josemaria Escrivá"},
  {"pt":"Não procures acomodação; procura o dever.","en":"Do not seek comfort; seek duty.","es":"No busques acomodación; busca el deber.","it":"Non cercare comodità; cerca il dovere.","src":"São Josemaria Escrivá"},
  {"pt":"A alegria é dom de Deus para quem o serve.","en":"Joy is God's gift to those who serve him.","es":"La alegría es don de Dios para quien lo sirve.","it":"La gioia è dono di Dio per chi lo serve.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres agradar a Deus, sê limpo de coração.","en":"If you want to please God, be clean of heart.","es":"Si quieres agradar a Dios, sé limpio de corazón.","it":"Se vuoi piacere a Dio, sii puro di cuore.","src":"São Josemaria Escrivá"},
  {"pt":"A mortificação é liberdade, não escravidão.","en":"Mortification is freedom, not slavery.","es":"La mortificación es libertad, no esclavitud.","it":"La mortificazione è libertà, non schiavitù.","src":"São Josemaria Escrivá"},
  {"pt":"Não tenhas medo de amar; amar é dar a vida.","en":"Do not be afraid to love; to love is to give life.","es":"No tengas miedo de amar; amar es dar la vida.","it":"Non aver paura di amare; amare è donare la vita.","src":"São Josemaria Escrivá"},
  {"pt":"A humildade é conhecer-se e esquecer-se.","en":"Humility is to know oneself and forget oneself.","es":"La humildad es conocerse y olvidarse.","it":"L'umiltà è conoscersi e dimenticarsi.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres ser santo, deixa Deus agir em ti.","en":"If you want to be a saint, let God act in you.","es":"Si quieres ser santo, deja a Dios obrar en ti.","it":"Se vuoi essere santo, lascia che Dio operi in te.","src":"São Josemaria Escrivá"},
  {"pt":"A oração é o encontro de dois amores: o teu e o de Deus.","en":"Prayer is the meeting of two loves: yours and God's.","es":"La oración es el encuentro de dos amores: el tuyo y el de Dios.","it":"La preghiera è l'incontro di due amori: il tuo e quello di Dio.","src":"São Josemaria Escrivá"},
  {"pt":"Não te preocupes com o resultado; ocupa-te do dever.","en":"Do not worry about the result; attend to the duty.","es":"No te preocupes por el resultado; ocupate del deber.","it":"Non preoccuparti del risultato; occupati del dovere.","src":"São Josemaria Escrivá"},
  {"pt":"A vida é um instante; usá-lo bem é a única sabedoria.","en":"Life is an instant; using it well is the only wisdom.","es":"La vida es un instante; emplearla bien es la única sabiduría.","it":"La vita è un istante; usarla bene è l'unica sapienza.","src":"São Josemaria Escrivá"},
  {"pt":"A mortificação é a espada que corta os laços do vício.","en":"Mortification is the sword that cuts the bonds of vice.","es":"La mortificación es la espada que corta los lazos del vicio.","it":"La mortificazione è la spada che taglia i legami del vizio.","src":"São Josemaria Escrivá"},
  {"pt":"Não procures consolo; procura consolar.","en":"Do not seek comfort; seek to comfort.","es":"No busques consuelo; busca consolar.","it":"Non cercare conforto; cerca di consolare.","src":"São Josemaria Escrivá"},
  {"pt":"A humildade é andar por baixo, onde está Cristo.","en":"Humility is to walk below, where Christ is.","es":"La humildad es andar por debajo, donde está Cristo.","it":"L'umiltà è camminare in basso, dove sta Cristo.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres agradar a Deus, sê pontual e ordenado.","en":"If you want to please God, be punctual and orderly.","es":"Si quieres agradar a Dios, sé puntual y ordenado.","it":"Se vuoi piacere a Dio, sii puntuale e ordinato.","src":"São Josemaria Escrivá"},
  {"pt":"A alegria é fruto de uma alma entregue a Deus.","en":"Joy is the fruit of a soul given to God.","es":"La alegría es fruto de un alma entregada a Dios.","it":"La gioia è frutto di un'anima donata a Dio.","src":"São Josemaria Escrivá"},
  {"pt":"Não digas que não podes; dize que hás de aprender.","en":"Do not say you cannot; say you have yet to learn.","es":"No digas que no puedes; di que has de aprender.","it":"Non dire che non puoi; di che devi imparare.","src":"São Josemaria Escrivá"},
  {"pt":"A caridade é ver Cristo em cada homem.","en":"Charity is to see Christ in every man.","es":"La caridad es ver a Cristo en cada hombre.","it":"La carità è vedere Cristo in ogni uomo.","src":"São Josemaria Escrivá"},
  {"pt":"Se amas a Deus, hás de amar o que Ele ama.","en":"If you love God, you must love what he loves.","es":"Si amas a Dios, has de amar lo que Él ama.","it":"Se ami Dio, devi amare ciò che Egli ama.","src":"São Josemaria Escrivá"},
  {"pt":"A oração não muda Deus; muda a ti.","en":"Prayer does not change God; it changes you.","es":"La oración no cambia a Dios; te cambia a ti.","it":"La preghiera non cambia Dio; cambia te.","src":"São Josemaria Escrivá"},
  {"pt":"Não tenhas medo da cruz; ela é o sinal do amor.","en":"Do not be afraid of the cross; it is the sign of love.","es":"No tengas miedo de la cruz; ella es la señal del amor.","it":"Non aver paura della croce; è il segno dell'amore.","src":"São Josemaria Escrivá"},
  {"pt":"A fidelidade nas coisas pequenas atrai a graça das grandes.","en":"Faithfulness in small things attracts the grace of great ones.","es":"La fidelidad en las cosas pequeñas atrae la gracia de las grandes.","it":"La fedeltà nelle piccole cose attira la grazia delle grandi.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres ser santo, serve sem esperar recompensa.","en":"If you want to be a saint, serve without expecting reward.","es":"Si quieres ser santo, sirve sin esperar recompensa.","it":"Se vuoi essere santo, servi senza aspettarti ricompensa.","src":"São Josemaria Escrivá"},
  {"pt":"A verdade dita com caridade liberta e edifica.","en":"Truth spoken with charity frees and builds up.","es":"La verdad dicha con caridad libera y edifica.","it":"La verità detta con carità libera e edifica.","src":"São Josemaria Escrivá"},
  {"pt":"Não te compares com os santos para desanimar.","en":"Do not compare yourself with the saints so as to be discouraged.","es":"No te compares con los santos para desanimarte.","it":"Non paragonarti ai santi per scoraggiarti.","src":"São Josemaria Escrivá"},
  {"pt":"A paz nasce de fazer a vontade de Deus.","en":"Peace is born of doing the will of God.","es":"La paz nace de hacer la voluntad de Dios.","it":"La pace nasce dal fare la volontà di Dio.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres agradar a Deus, trabalha com arte.","en":"If you want to please God, work with skill.","es":"Si quieres agradar a Dios, trabaja con arte.","it":"Se vuoi piacere a Dio, lavora con arte.","src":"São Josemaria Escrivá"},
  {"pt":"A humildade é a virtude que atrai as outras.","en":"Humility is the virtue that attracts the others.","es":"La humildad es la virtud que atrae a las demás.","it":"L'umiltà è la virtù che attira le altre.","src":"São Josemaria Escrivá"},
  {"pt":"Não digas que não tens tempo para os outros.","en":"Do not say you have no time for others.","es":"No digas que no tienes tiempo para los demás.","it":"Non dire che non hai tempo per gli altri.","src":"São Josemaria Escrivá"},
  {"pt":"A oração é força para a vida inteira.","en":"Prayer is strength for the whole of life.","es":"La oración es fuerza para la vida entera.","it":"La preghiera è forza per l'intera vita.","src":"São Josemaria Escrivá"},
  {"pt":"Se amas deveras, não procuras ser servido.","en":"If you truly love, you do not seek to be served.","es":"Si amas de verdad, no buscas ser servido.","it":"Se ami davvero, non cerchi di essere servito.","src":"São Josemaria Escrivá"},
  {"pt":"A caridade é paciência com quem erra.","en":"Charity is patience with those who err.","es":"La caridad es paciencia con quien yerra.","it":"La carità è pazienza con chi sbaglia.","src":"São Josemaria Escrivá"},
  {"pt":"Não tenhas medo do mundo; vence-o com o amor.","en":"Do not be afraid of the world; conquer it with love.","es":"No tengas miedo del mundo; vencelo con el amor.","it":"Non aver paura del mondo; vincilo con l'amore.","src":"São Josemaria Escrivá"},
  {"pt":"A santidade é amar a Deus sobre todas as coisas.","en":"Holiness is to love God above all things.","es":"La santidad es amar a Dios sobre todas las cosas.","it":"La santità è amare Dio sopra ogni cosa.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres paz, foge do orgulho.","en":"If you want peace, flee from pride.","es":"Si quieres paz, huye del orgullo.","it":"Se vuoi pace, fuggi dall'orgoglio.","src":"São Josemaria Escrivá"},
  {"pt":"A mortificação é dizer não a si mesmo para dizer sim a Deus.","en":"Mortification is saying no to oneself in order to say yes to God.","es":"La mortificación es decir no a sí mismo para decir sí a Dios.","it":"La mortificazione è dire no a sé stessi per dire sì a Dio.","src":"São Josemaria Escrivá"},
  {"pt":"Não procures aplauso; procura agradar a Deus.","en":"Do not seek applause; seek to please God.","es":"No busques aplauso; busca agradar a Dios.","it":"Non cercare applausi; cerca di piacere a Dio.","src":"São Josemaria Escrivá"},
  {"pt":"A alegria cristã é otimismo fundado em Deus.","en":"Christian joy is optimism founded on God.","es":"La alegría cristiana es optimismo fundado en Dios.","it":"La gioia cristiana è ottimismo fondato su Dio.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres ser útil, ama o teu dever.","en":"If you want to be useful, love your duty.","es":"Si quieres ser útil, ama tu deber.","it":"Se vuoi essere utile, ama il tuo dovere.","src":"São Josemaria Escrivá"},
  {"pt":"A oração dá sentido a todo o trabalho.","en":"Prayer gives meaning to all work.","es":"La oración da sentido a todo el trabajo.","it":"La preghiera dà senso a tutto il lavoro.","src":"São Josemaria Escrivá"},
  {"pt":"Não te deixes abater pela crítica; segue o teu caminho.","en":"Do not be crushed by criticism; follow your path.","es":"No te dejes abatir por la crítica; sigue tu camino.","it":"Non lasciarti abbattere dalla critica; segui la tua via.","src":"São Josemaria Escrivá"},
  {"pt":"A humildade é reconhecer que tudo é dom.","en":"Humility is to recognize that everything is a gift.","es":"La humildad es reconocer que todo es don.","it":"L'umiltà è riconoscere che tutto è dono.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres agradar a Deus, sê constante.","en":"If you want to please God, be constant.","es":"Si quieres agradar a Dios, sé constante.","it":"Se vuoi piacere a Dio, sii costante.","src":"São Josemaria Escrivá"},
  {"pt":"A caridade é dar sem contar o custo.","en":"Charity is to give without counting the cost.","es":"La caridad es dar sin contar el costo.","it":"La carità è donare senza contare il costo.","src":"São Josemaria Escrivá"},
  {"pt":"Não tenhas medo do silêncio; Deus fala nele.","en":"Do not be afraid of silence; God speaks in it.","es":"No tengas miedo del silencio; Dios habla en él.","it":"Non aver paura del silenzio; Dio parla in esso.","src":"São Josemaria Escrivá"},
  {"pt":"A fé é luz que não se apaga.","en":"Faith is a light that does not go out.","es":"La fe es luz que no se apaga.","it":"La fede è luce che non si spegne.","src":"São Josemaria Escrivá"},
  {"pt":"Se queres ser santo, não te contentes com o pouco.","en":"If you want to be a saint, do not settle for little.","es":"Si quieres ser santo, no te conformes con lo poco.","it":"Se vuoi essere santo, non ti accontentare del poco.","src":"São Josemaria Escrivá"},
  {"pt":"A oração é diálogo, não monólogo.","en":"Prayer is dialogue, not monologue.","es":"La oración es diálogo, no monólogo.","it":"La preghiera è dialogo, non monologo.","src":"São Josemaria Escrivá"},
  {"pt":"Não digas que não serves; serve onde estiveres.","en":"Do not say you are of no use; serve wherever you are.","es":"No digas que no sirves; sirve donde estés.","it":"Non dire di non servire; servi dove ti trovi.","src":"São Josemaria Escrivá"},
  {"pt":"A alegria é sinal de consciência reta.","en":"Joy is a sign of a right conscience.","es":"La alegría es señal de conciencia recta.","it":"La gioia è segno di coscienza retta.","src":"São Josemaria Escrivá"},
  {"pt":"Se amas a Deus, hás de perdoar sempre.","en":"If you love God, you must forgive always.","es":"Si amas a Dios, has de perdonar siempre.","it":"Se ami Dio, devi perdonare sempre.","src":"São Josemaria Escrivá"},
  {"pt":"A mortificação é meio, não fim.","en":"Mortification is a means, not an end.","es":"La mortificación es medio, no fin.","it":"La mortificazione è mezzo, non fine.","src":"São Josemaria Escrivá"},

const STRONG = {
  pt:["deus","senhor","amor","paz","luz","vida","fé","alegria","esperança","coragem","graça","misericórdia","salvação","reino","espírito","cristo","fortalece","coração","providência","confiança","verdade","liberdade","alma","criaturas","oração"],
  en:["god","lord","love","peace","light","life","faith","joy","hope","courage","grace","mercy","salvation","kingdom","spirit","christ","strengthens","heart","providence","confidence","truth","freedom","soul","creatures","prayer"],
  es:["dios","señor","amor","paz","luz","vida","fe","alegría","esperanza","ánimo","gracia","misericordia","salvación","reino","espíritu","cristo","fortalece","corazón","providencia","confianza","verdad","libertad","alma","criaturas","oración"],
  it:["dio","signore","amore","pace","luce","vita","fede","gioia","speranza","coraggio","grazia","misericordia","salvezza","regno","spirito","cristo","forza","cuore","provvidenza","confidanza","verità","libertà","anima","creature","preghiera"]
};
function isStrong(word,lang){
  const core=word.toLowerCase().replace(/[.,;:!?()"']/g,'');
  return STRONG[lang].includes(core);
}

const $ = s => document.querySelector(s);
const phraseEl=$('#phrase'), refEl=$('#ref'),
      hintEl=$('#hint'), langBtn=$('#langBtn'),
      readBtn=$('#readBtn'), shareBtn=$('#shareBtn'), toastEl=$('#toast');

const LANGS=['pt','en','es','it'], LABELS={pt:'PT',en:'EN',es:'ES',it:'IT'};
let lang='pt', langIdx=0, current=null, rolling=false, speech=null;

function todayStr(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function loadState(){try{return JSON.parse(localStorage.getItem('luzPalavra')||'null');}catch(e){return null;}}
function saveState(o){localStorage.setItem('luzPalavra',JSON.stringify(o));}
function toast(msg){toastEl.textContent=msg;toastEl.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>toastEl.classList.remove('show'),2200);}
function pick(){return PHRASES[Math.floor(Math.random()*PHRASES.length)];}
function shortRef(s){
  let t = s
    .replace('Virgem Maria — ','')
    .replace('Primeira Carta de São João','1 João')
    .replace('Segunda Carta aos Coríntios','2 Coríntios')
    .replace('Primeira Carta aos Coríntios','1 Coríntios')
    .replace('Primeira Carta aos Tessalonicenses','1 Tessalonicenses')
    .replace('Carta aos Filipenses','Filipenses')
    .replace('Carta aos Romanos','Romanos')
    .replace('Carta aos Hebreus','Hebreus')
    .replace('Profecia de Isaías','Isaías')
    .replace('Profecia de Jeremias','Jeremias')
    .replace('Evangelho de Mateus','Mateus')
    .replace('Evangelho de João','João')
    .replace('Evangelho de Lucas','Lucas')
    .replace('Evangelho de Marcos','Marcos');
  return t
    .replace('1 João','1Jo').replace('2 Coríntios','2Cor').replace('1 Coríntios','1Cor').replace('1 Tessalonicenses','1Ts')
    .replace('Mateus','Mt').replace('Marcos','Mc').replace('Lucas','Lc').replace('João','Jo')
    .replace('Salmo','Sl').replace('Isaías','Is').replace('Jeremias','Jr')
    .replace('Filipenses','Fl').replace('Romanos','Rm').replace('Hebreus','Hb');
}

function highlightHTML(text){
  const toks=text.split(/(\s+)/);
  const strong=new Set();
  toks.forEach((t,i)=>{
    if(!/^\s+$/.test(t)&&t!==''){ if(isStrong(t,lang)) strong.add(i); }
  });
  if(strong.size===0){
    let bi=-1,bl=0;
    toks.forEach((t,i)=>{
      if(!/^\s+$/.test(t)&&t!==''){const L=t.replace(/[.,;:!?()"']/g,'').length;if(L>bl){bl=L;bi=i;}}
    });
    if(bi>=0)strong.add(bi);
  }
  return toks.map((t,i)=> strong.has(i) ? '<mark class="hl">'+t+'</mark>' : t).join('');
}
function show(p,label){
  current=p;
  phraseEl.classList.remove('rolling');
  phraseEl.innerHTML=highlightHTML(p[lang]);
  refEl.textContent=shortRef(p.src);
}

function rollAnimation(label){
  if(rolling)return;
  rolling=true;shareBtn.disabled=true;readBtn.disabled=true;
  phraseEl.classList.add('rolling');
  const end=Date.now()+3000;
  const tick=()=>{
    phraseEl.textContent=pick()[lang];
    if(Date.now()<end){requestAnimationFrame(tick);}
    else{
      const chosen=pick();
      show(chosen,label);
      saveState({date:todayStr(),idx:PHRASES.indexOf(chosen),label});
      rolling=false;shareBtn.disabled=false;readBtn.disabled=false;
      lockUntilMidnight();
      toast('Frase guardada até a meia-noite ✦');
    }
  };
  requestAnimationFrame(tick);
}

function lockUntilMidnight(){
  hintEl.textContent='uma palavra por dia · renova à 00:00';
}

function init(){
  const st=loadState();
  if(st&&st.date===todayStr()&&PHRASES[st.idx]){
    show(PHRASES[st.idx],st.label||'Frase do dia');
    lockUntilMidnight();
  }else{
    rollAnimation('Frase do dia');
  }
}

langBtn.addEventListener('click',()=>{
  langIdx=(langIdx+1)%LANGS.length;
  lang=LANGS[langIdx];
  langBtn.textContent=LABELS[lang];
  if(current)show(current);
});

readBtn.addEventListener('click',()=>{
  if(!current)return;
  if(speechSynthesis.speaking){speechSynthesis.cancel();return;}
  const map={pt:'pt-BR',en:'en-US',es:'es-ES',it:'it-IT'};
  speech=new SpeechSynthesisUtterance(current[lang]);
  speech.lang=map[lang];speech.rate=.95;speech.pitch=1;
  speechSynthesis.speak(speech);
});

shareBtn.addEventListener('click',()=>{if(!rolling&&current)shareStory(current,'FRASE DO DIA');});

/* ---------- canvas: story minimalista ---------- */
function wrapText(ctx,text,maxW){
  const words=text.split(' ');const lines=[];let line='';
  for(const w of words){const t=line?line+' '+w:w;
    if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;}
  if(line)lines.push(line);return lines;
}
function drawMarker(ctx,x,y,w,h,rot){
  ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.fillStyle='rgba(240,226,166,.85)';
  ctx.beginPath();
  ctx.moveTo(0,h*0.18);
  ctx.bezierCurveTo(w*0.3,-h*0.08,w*0.7,h*0.28,w,h*0.12);
  ctx.lineTo(w,h*0.92);
  ctx.bezierCurveTo(w*0.7,h*1.18,w*0.3,h*0.82,0,h*1.04);
  ctx.closePath();ctx.fill();ctx.restore();
}
function paperBg(ctx,W,H){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#f6f0e3');g.addColorStop(1,'#e9dfcd');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(120,105,80,.05)';
  for(let i=0;i<2600;i++){const x=Math.random()*W,y=Math.random()*H;ctx.fillRect(x,y,1,1);}
}
function renderPhrase(ctx,p,lang,W,H){
  const fs=68,lh=fs*1.3,cx=W/2;
  ctx.font='400 '+fs+'px "Special Elite", monospace';
  const maxW=W-220, lines=wrapText(ctx,p[lang],maxW);
  const totalH=lines.length*lh, startY=(H-totalH)/2 + lh*0.18;
  const boxes=[];
  lines.forEach((line,li)=>{
    const words=line.split(' ');
    const ww=words.map(w=>ctx.measureText(w).width);
    const sp=ctx.measureText(' ').width;
    const lineW=ww.reduce((a,b)=>a+b,0)+sp*(words.length-1);
    let x=cx-lineW/2;const y=startY+li*lh;
    words.forEach((w,wi)=>{boxes.push({text:w,x,y,w:ww[wi],strong:isStrong(w,lang)});x+=ww[wi]+sp;});
  });
  if(!boxes.some(b=>b.strong)){
    let bi=0,bl=0;
    boxes.forEach((b,i)=>{const L=b.text.replace(/[.,;:!?()"']/g,'').length;if(L>bl){bl=L;bi=i;}});
    if(boxes[bi])boxes[bi].strong=true;
  }
  boxes.forEach(b=>{if(b.strong)drawMarker(ctx,b.x-6,b.y-fs*0.95,b.w+12,fs*1.06,(Math.random()*1.6-0.8)*Math.PI/180);});
  ctx.fillStyle='#1f1d1a';ctx.textAlign='left';ctx.textBaseline='alphabetic';
  boxes.forEach(b=>ctx.fillText(b.text,b.x,b.y));
  return startY + (lines.length-1)*lh + fs*0.15;
}
async function makeStory(p,label){
  if(document.fonts&&document.fonts.ready)await document.fonts.ready;
  return new Promise(res=>{
    const W=1080,H=1920,sc=2;
    const c=document.createElement('canvas');c.width=W*sc;c.height=H*sc;
    const ctx=c.getContext('2d');ctx.scale(sc,sc);
    paperBg(ctx,W,H);
    const bottomY=renderPhrase(ctx,p,lang,W,H);
    ctx.textAlign='center';ctx.textBaseline='alphabetic';
    ctx.fillStyle='#9a9081';ctx.font='400 28px "Courier Prime", monospace';
    ctx.fillText(shortRef(p.src),W/2,bottomY+66);
    ctx.fillStyle='rgba(31,29,26,.38)';ctx.font='400 42px "Special Elite", monospace';
    ctx.fillText('RheMar',W/2,H-180);
    ctx.fillStyle='#9a9081';ctx.font='400 22px "Courier Prime", monospace';
    ctx.fillText('Não desiste!',W/2,H-142);
    c.toBlob(b=>res(b),'image/png');
  });
}
async function shareStory(p,label){
  const blob=await makeStory(p,label);
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='rhemar-story.png';a.click();URL.revokeObjectURL(url);
  toast('Story baixado ✦');
}

/* admin oculto: 15 toques na tela -> nova frase aleatória (sem aviso visual ou textual) */
let _adminTaps = 0;
document.addEventListener('click', () => {
  _adminTaps++;
  if (_adminTaps >= 15) {
    _adminTaps = 0;
    let p;
    do { p = PHRASES[Math.floor(Math.random()*PHRASES.length)]; }
    while (current && p === current && PHRASES.length > 1);
    show(p, 'Admin');
  }
}, true);

init();
</script>
